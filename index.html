<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign-Off (Hybrid SaaS Interface)</title>
<style>
  :root {
    /* HYBRID SAAS / TACTICAL THEME */
    --bg-page: #0B1121;
    --bg-card: #1E293B;
    --border: #334155;
    
    --text-main: #F8FAFC;
    --text-body: #CBD5E1;
    --text-muted: #94A3B8;
    
    --accent-blue: #3B82F6;
    --accent-red: #DC2626;
    --accent-red-dim: rgba(239, 68, 68, 0.1);
    --accent-red-text: #FCA5A5;
    
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "Cascadia Code", "JetBrains Mono", monospace;
  }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  
  body {
    background: var(--bg-page);
    color: var(--text-body);
    font-family: var(--font-sans);
    min-height: 100vh;
    line-height: 1.6;
    user-select: none;
  }
  
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  
  /* Typography & Structure */
  .eyebrow {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  
  h1 {
    font-size: 24px;
    color: var(--text-main);
    margin: 0 0 8px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  
  h2 {
    font-size: 18px;
    color: var(--text-main);
    margin: 0 0 16px;
    font-weight: 500;
  }
  
  h3 {
    font-size: 14px;
    color: var(--text-main);
    margin: 24px 0 8px;
    font-weight: 600;
  }
  
  p { margin: 0 0 16px; font-size: 14.5px; }
  
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  
  /* Telemetry & Badges */
  .contact-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  
  .confidence {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .conf-low { background: rgba(245, 158, 11, 0.1); color: #FCD34D; border: 1px solid rgba(245, 158, 11, 0.2); }
  .conf-medium { background: rgba(249, 115, 22, 0.1); color: #FDBA74; border: 1px solid rgba(249, 115, 22, 0.2); }
  .conf-high { background: var(--accent-red-dim); color: var(--accent-red-text); border: 1px solid rgba(239, 68, 68, 0.2); }
  
  /* Demo Diagnostic Hints */
  .diagnostic-bubble {
    background: rgba(59, 130, 246, 0.08);
    border: 1px dashed rgba(59, 130, 246, 0.4);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 12.5px;
    color: #93C5FD;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .diagnostic-bubble span {
    font-family: var(--font-mono);
    font-weight: bold;
    color: var(--accent-blue);
  }

  /* Buttons - SaaS Styling */
  button {
    font-family: var(--font-sans);
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    width: 100%;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  
  button[data-action="verify"] {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
    box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
  }
  button[data-action="verify"]:hover:not(:disabled) { background: #2563EB; }
  
  button[data-action="abort"], button[data-action="escalate"] {
    background: transparent;
    border-color: var(--border);
  }
  button[data-action="abort"]:hover:not(:disabled), button[data-action="escalate"]:hover:not(:disabled) {
    background: #334155;
  }
  
  .startbtn {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
    margin-top: 10px;
  }
  .startbtn:hover { background: #2563EB; }
  
  .role-btn {
    background: var(--bg-card);
    text-align: left;
    margin-bottom: 12px;
  }
  .role-btn:hover { background: var(--border); }
  .role-btn .rname { font-weight: 600; display: block; margin-bottom: 4px; color: var(--text-main); }
  .role-btn .rdesc { font-size: 13px; color: var(--text-muted); font-weight: normal; }
  
  .restart { text-align: center; margin-top: 20px; }
  .restart:hover { background: var(--border); }

  /* Hold-to-Authorize Button Mechanic */
  .hold-btn { 
    position: relative; 
    overflow: hidden; 
    background: var(--accent-red);
    color: white;
    border-color: var(--accent-red);
    box-shadow: 0 2px 4px rgba(220, 38, 38, 0.2);
    -webkit-touch-callout: none;
  }
  .hold-btn:hover:not(:disabled) { filter: brightness(1.1); }
  .hold-fill { 
    position: absolute; 
    top: 0; left: 0; bottom: 0; 
    width: 0%; 
    background: rgba(0,0,0,0.35);
    z-index: 1; 
  }
  .hold-text { 
    position: relative; 
    z-index: 2; 
    pointer-events: none; 
  }
  
  /* Timer & Progress */
  .timerbar-track {
    height: 6px;
    background: var(--bg-page);
    border-radius: 3px;
    overflow: hidden;
    margin: 16px 0 8px;
  }
  .timerbar-fill {
    height: 100%;
    background: var(--accent-blue);
    transition: width 1s linear, background 0.5s;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
  }
  .timerlabel {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .stale-note {
    font-size: 13px;
    color: var(--accent-red-text);
    margin-bottom: 16px;
    font-weight: 500;
  }
  
  /* Reveals & Debrief */
  .reveal-note {
    font-size: 14px;
    color: var(--text-body);
    background: rgba(59, 130, 246, 0.1);
    border-left: 3px solid var(--accent-blue);
    padding: 12px 16px;
    margin-bottom: 16px;
    border-radius: 0 4px 4px 0;
  }
  .reveal-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-blue);
    display: block;
    margin-bottom: 6px;
  }
  .disclosure {
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 16px;
  }
  
  /* Debrief Meters */
  .meter-row { margin-bottom: 20px; }
  .meter-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--text-main);
  }
  .meter-track {
    height: 8px;
    background: var(--bg-page);
    border-radius: 4px;
    overflow: hidden;
  }
  .meter-fill { height: 100%; border-radius: 4px; }
  
  .gt-block {
    background: var(--bg-card);
    border-left: 3px solid var(--border);
    padding: 16px;
    margin-bottom: 16px;
    border-radius: 0 6px 6px 0;
  }
  .gt-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: var(--text-main); }
  .gt-truth { font-size: 14px; color: var(--text-body); }
  .compare-line { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  
  .bignum { font-size: 36px; font-weight: 600; color: var(--text-main); }
  
  /* Loading Overlay */
  .loading-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(30, 41, 59, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 8px;
  }
  .loading-overlay.active {
    visibility: visible;
    opacity: 1;
  }
  .loader {
    border: 3px solid var(--border);
    border-top: 3px solid var(--accent-blue);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>

<div id="app"></div>

    isVerifying:false, isDemo:false, bdaShown:false,
    
    // Hesitation Tracking
    hoverStart: null, totalHoverTime: 0, hesitatedCount: 0
  };
}

function uid(){
  return (crypto.randomUUID ? crypto.randomUUID() : ("s"+Math.random().toString(36).slice(2)+Date.now()));
}

/* ============ NETWORKING ============ */
function postData(payload){
  try{
    fetch(SHEET_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    }).catch(()=>{});
  }catch(e){}
}

async function fetchAggregate(){
  try{
    const res = await fetch(SHEET_URL, {method:"GET"});
    return await res.json();
  }catch(e){
    return {};
  }
}

function startSession(role){

/* ============ ROUND / CONTACT SETUP ============ */
function loadRound(idx){
  clearInterval(state.timer);
  state.roundIndex = idx;
  const scenario = SCENARIOS[idx];
  const queue = [{kind:"main", scenario}];
  if(state.role === "commander"){
    const shuffled = [...FILLERS];
    if(idx % 2 === 0){ queue.push({kind:"filler", filler: shuffled[0]}); }
    else { queue.push({kind:"filler", filler: shuffled[1]}); queue.push({kind:"filler", filler: shuffled[0]}); }
    queue.sort(()=>Math.random()-0.5);
  }
  state.contactsQueue = queue;
  state.contactPos = 0;
  state.timeLeft = ROUND_SECONDS;
  state.stale = false;
  state.currentRevealed = false;
  state.usedVerifyThisContact = false;
  state.isVerifying = false;
  state.totalHoverTime = 0;
  state.hoverStart = null;
  renderContact();
  startTimer();
}

function startTimer(){
  clearInterval(state.timer);
  state.timer = setInterval(()=>{
    if(state.isVerifying) return; 

    state.timeLeft -= 1;
    if(state.timeLeft <= 0){
      state.timeLeft = 0;
      state.stale = true;
      clearInterval(state.timer);
    }
    updateTimerUI();
  },1000);
}

function updateTimerUI(){
  const fill = document.getElementById("timerfill");
  const label = document.getElementById("timerlabel");
  const staleNote = document.getElementById("staleNote");
  if(!fill) return;
  const pct = Math.max(0,(state.timeLeft/ROUND_SECONDS)*100);
  fill.style.width = pct+"%";
  fill.style.background = pct>30 ? "var(--accent-blue)" : "var(--accent-red)";
  if(label) label.textContent = state.stale ? "TIME EXPIRED" : `T-MINUS ${state.timeLeft}.0s`;
  if(staleNote) staleNote.style.display = state.stale ? "block":"none";
  document.querySelectorAll("[data-action='verify']").forEach(b=>{
    if(state.stale) b.disabled = true;
  });
}

/* ============ HOLD TO AUTHORIZE LOGIC ============ */
let holdAnimFrame;
let holdStartTime = 0;

function startHold(action) {
  if(state.isVerifying) return; 
  const btn = document.querySelector(`button[data-action='${action}']`);
  if(!btn) return;
  const fill = btn.querySelector('.hold-fill');
  holdStartTime = performance.now();

  function update(time) {
    let elapsed = time - holdStartTime;
    let pct = Math.min(100, (elapsed / HOLD_TIME_MS) * 100);
    if(fill) fill.style.width = pct + '%';
    
    if(pct >= 100) {
      stopHold(action);
      handleDecision(action);
    } else {
      holdAnimFrame = requestAnimationFrame(update);
    }
  }
  holdAnimFrame = requestAnimationFrame(update);
}

function stopHold(action) {
  cancelAnimationFrame(holdAnimFrame);
  const btn = document.querySelector(`button[data-action='${action}']`);
  if(btn) {
    const fill = btn.querySelector('.hold-fill');
    if(fill) fill.style.width = '0%';
  }
}

/* ============ RENDER CONTACT ============ */
function renderContact(){
  const item = state.contactsQueue[state.contactPos];
  const roleInfo = state.isDemo ? { name: "Training Officer", menu: [["Hold / Abort", "abort"], ["Request More Data", "verify"], ["Hold to Authorize", "engage"]] } : ROLE_INFO[state.role];
  const totalRounds = state.isDemo ? 1 : SCENARIOS.length;
  const roundLabel = state.isDemo ? "TRAINING OVERLAY" : `SCENARIO 0${state.roundIndex+1} // ${totalRounds}`;
  const contactTag = state.contactsQueue.length>1
    ? `<div class="contact-tag">QUEUE: CONTACT ${state.contactPos+1} OF ${state.contactsQueue.length}</div>` : "";

  let bodyText, confidence, revealText;
  if(state.isDemo) {
    bodyText = item.scenario.text.operator;
    confidence = item.scenario.confidence;
    revealText = item.scenario.reveal.operator;
  } else if(item.kind === "main"){
    bodyText = item.scenario.text[state.role];
    confidence = item.scenario.confidence;
    revealText = item.scenario.reveal[state.role];
  } else {
    bodyText = item.filler.label;
    confidence = item.filler.confidence;
    revealText = item.filler.reveal || null;
  }

  // Diagnostic hints for the demo sandbox
  let timerDiagnostic = state.isDemo ? `<div class="diagnostic-bubble"><span>[DIAGNOSTIC 01]</span> Countdown tracking bar. If this expires completely, your options freeze and you must choose based strictly on initial data.</div>` : "";
  
  let menuButtons = roleInfo.menu.map(([label,action])=>{
    if(state.currentRevealed && action === "verify") return ""; // filter out verify if already revealed

    let diagnosticTag = "";
    if(state.isDemo) {
      if(action === "engage") diagnosticTag = `<div class="diagnostic-bubble"><span>[DIAGNOSTIC 04]</span> High-friction key. Requires a persistent 1.5s hold parameter to avoid automated misfires. Activates recommendation.</div>`;
      if(action === "abort") diagnosticTag = `<div class="diagnostic-bubble"><span>[DIAGNOSTIC 02]</span> Standard exit key. Safely dismisses the target packet and jumps execution parameters to the next asset in line.</div>`;
      if(action === "verify") diagnosticTag = `<div class="diagnostic-bubble"><span>[DIAGNOSTIC 03]</span> Context extension key. Queries internal networks for sensor clarity but enforces a mandatory -8.0s operational penalty penalty.</div>`;
    }

    if(action === "engage") {
      return `${diagnosticTag}<button data-action="${action}" class="hold-btn" 
               onmousedown="startHold('${action}')" 
               onmouseup="stopHold('${action}')" 
               onmouseleave="stopHold('${action}')" 
               ontouchstart="startHold('${action}')" 
               ontouchend="stopHold('${action}')">
               <div class="hold-fill"></div>
               <span class="hold-text">Hold to Authorize</span>
             </button>`;
    }
    const handler = action === "verify" ? `triggerVerify()` : `handleDecision('${action}')`;
    return `${diagnosticTag}<button data-action="${action}" onclick="${handler}">${label}</button>`;
  }).join("");

  const revealBlock = (state.currentRevealed && revealText) ? `
    <div class="reveal-note">
      <span class="reveal-tag">Telemetry / Additional Data</span>
      ${revealText}
    </div>
  ` : "";

  const loaderOverlay = `
    <div id="verifyLoader" class="loading-overlay ${state.isVerifying ? 'active' : ''}">
      <div class="loader"></div>
    </div>
  `;

  app.innerHTML = `
    ${eyebrow(roundLabel)}
    <h2>${roleInfo.name} Review</h2>
    <div class="card">
      ${loaderOverlay}
      <div id="cardContent" style="${state.isVerifying ? 'visibility:hidden' : ''}">
        ${contactTag}
        ${confBadge(confidence)}
        <p>${bodyText}</p>
        ${revealBlock}
        ${timerDiagnostic}
        <div class="timerbar-track"><div class="timerbar-fill" id="timerfill" style="width:100%"></div></div>
        <div class="timerlabel" id="timerlabel">T-MINUS ${ROUND_SECONDS}.0s</div>
        <div class="stale-note" id="staleNote" style="display:none;">Window closed — telemetry is stale. Force final decision.</div>
        ${menuButtons}
      </div>
    </div>
  `;
  updateTimerUI();

  // Track Hesitation on the 'Verify' button
  const verifyBtn = document.querySelector('button[data-action="verify"]');
  if(verifyBtn) {
    verifyBtn.addEventListener('mouseenter', () => { state.hoverStart = performance.now(); });
    verifyBtn.addEventListener('mouseleave', () => {
      if(state.hoverStart) {
        state.totalHoverTime += (performance.now() - state.hoverStart);
        state.hoverStart = null;
      }
    });
  }
}

/* ============ VERIFY (REVEAL) ============ */
function triggerVerify(){
  if(state.currentRevealed || state.stale || state.isVerifying) return;
  
  state.isVerifying = true;
  renderContact(); 

  setTimeout(() => {
    state.isVerifying = false;
    state.currentRevealed = true;
    state.usedVerifyThisContact = true;
    state.timeLeft = Math.max(0, state.timeLeft - VERIFY_TIME_COST);
    if(state.timeLeft === 0) state.stale = true;
    renderContact();
  }, VERIFY_LOADING_MS);
}

/* ============ DECISION HANDLING ============ */
function resolveFillerGroundTruth(filler){
  if(filler.groundTruth === "__RANDOM__") return Math.random()<0.5 ? "The vehicle was legitimate civilian traffic." : "The vehicle was a confirmed hostile transport.";
  if(filler.groundTruth === "legit") return "The vehicle was routine logistics traffic.";
  return filler.groundTruth;
}
function resolveScenarioGroundTruth(scenario){
  if(scenario.groundTruth === "__RANDOM__"){
    return Math.random()<0.5
      ? "It proceeded correctly on its own — the contact was hostile."
      : "It proceeded in error — the contact was not hostile.";
  }
  return scenario.groundTruth;
}

function handleDecision(action){
  if(state.isVerifying) return; 

  if(state.isDemo) {
      clearInterval(state.timer);
      app.innerHTML = `
        ${eyebrow("Training Module Clear")}
        <h1>System Diagnostics Configured</h1>
        <div class="card">
          <p>Training tracking sequence finalized. Sandbox protocols are now disengaged.</p>
          <p>You are ready to enter the active chain of command. Be advised that your review clock operates under live constraints and actions cannot be undone.</p>
          <button class="startbtn" onclick="goToRoleSelect()">Deploy to Chain of Command</button>
        </div>
      `;
      return;
  }

  // Finalize any active hover time logging
  if(state.hoverStart) {
      state.totalHoverTime += (performance.now() - state.hoverStart);
      state.hoverStart = null;
  }
  
  // If they engaged, hadn't verified, and hovered over verify for >1.5s, log hesitation
  if(action === 'engage' && !state.usedVerifyThisContact && state.totalHoverTime > 1500) {
      state.hesitatedCount++;
  }

  const item = state.contactsQueue[state.contactPos];
  let ihl=0, oversight=0, mission=0, ambiguous=false, confidence, scenarioId, groundTruth, biasFlag=false;
  const usedVerify = state.usedVerifyThisContact;

  if(item.kind === "main"){
    const sc = item.scenario;
    scenarioId = sc.id;
    ambiguous = sc.ambiguous;
    confidence = sc.confidence;
    const s = sc.score[action] || {ihl:0,oversight:0,mission:0};
    ihl = s.ihl; oversight = s.oversight; mission = s.mission;
    groundTruth = resolveScenarioGroundTruth(sc);
    if(s.random && groundTruth.includes("error")){ ihl-=3; oversight-=1; mission-=2; }
    biasFlag = (ambiguous && action==="engage" && !usedVerify && (confidence==="Medium"||confidence==="High"));
    if(usedVerify){ ihl += 1; oversight += 2; }
  } else {
    const f = item.filler;
    scenarioId = "filler_"+f.key;
    confidence = f.confidence;
    ambiguous = true;
    const s = f.score[action] || {ihl:0,oversight:0,mission:0};
    ihl = s.ihl; oversight = s.oversight; mission = s.mission;
    groundTruth = resolveFillerGroundTruth(f);
    if(s.random && groundTruth.includes("civilian")){ ihl-=2; oversight-=1; mission-=1; }
    biasFlag = (action==="engage" && !usedVerify && (confidence==="Medium"||confidence==="High"));
    if(usedVerify){ ihl += 1; oversight += 2; }
  }

  state.meters.ihl += ihl;
  state.meters.oversight += oversight;
  state.meters.mission += mission;
  if(biasFlag) state.biasCount += 1;

  state.log.push({
    scenario_id: scenarioId, contact_index: state.contactPos, ai_confidence: confidence,
    decision: action, used_verify: usedVerify, waited_for_pressure: state.stale,
    was_ambiguous: ambiguous, automation_bias_flag: biasFlag, ihl_outcome: ihl, ground_truth: groundTruth
  });

  postData({
    type:"round", session_id: state.sessionId, role: state.role, scenario_id: scenarioId,
    contact_index: state.contactPos, ai_confidence: confidence, decision: action, used_verify: usedVerify,
    waited_for_pressure: state.stale, was_ambiguous: ambiguous, automation_bias_flag: biasFlag,
    ihl_outcome: ihl, ground_truth: groundTruth
  });

  state.contactPos += 1;
  state.currentRevealed = false;
  state.usedVerifyThisContact = false;
  state.totalHoverTime = 0;

  if(state.contactPos < state.contactsQueue.length){
    renderContact();
  } else if(state.roundIndex === 4 && !state.bdaShown) {
    clearInterval(state.timer);
    state.bdaShown = true;
    triggerBDA();
  } else if(state.roundIndex + 1 < SCENARIOS.length){
    loadRound(state.roundIndex + 1);
  } else {
    clearInterval(state.timer);
    finishSession();
  }
}

/* ============ DEBRIEF ============ */
async function finishSession(){
  const clamp = v => Math.max(0, Math.min(100, Math.round(v)));
  const meters = {
    ihl: clamp(state.meters.ihl),
    oversight: clamp(state.meters.oversight),
    mission: clamp(state.meters.mission)
  };

  postData({
    type:"session", session_id: state.sessionId, role: state.role,
    ihl_compliance: meters.ihl, oversight_retained: meters.oversight, mission_success: meters.mission,
    automation_bias_count: state.biasCount, scenarios_completed: SCENARIOS.length
  });

  app.innerHTML = `${eyebrow("SYSTEM DEBRIEF")}<h1>Compiling results…</h1><p>Pulling comparison data.</p>`;
  const agg = await fetchAggregate();
  renderDebrief(meters, agg);
}

function meterColor(v){
  if(v>=66) return "var(--accent-blue)";
  if(v>=40) return "#94A3B8"; 
  return "var(--accent-red)";
}

function renderDebrief(meters, agg){
  const meterHTML = (label,val) => `
    <div class="meter-row">
      <div class="meter-label"><span>${label}</span><span>${val}</span></div>
      <div class="meter-track"><div class="meter-fill" style="width:${val}%; background:${meterColor(val)};"></div></div>
    </div>

  const gtHTML = state.log.filter(r=>!r.scenario_id.startsWith("filler_") && r.scenario_id !== "demo").map(r=>{
    const sc = SCENARIOS.find(s=>s.id===r.scenario_id);
    let compareLine = "";
    if(agg && agg[r.scenario_id]){
      const counts = agg[r.scenario_id];
      const total = Object.values(counts).reduce((a,b)=>a+b,0);
      const yours = counts[r.decision] || 0;
      const pct = total>0 ? Math.round((yours/total)*100) : null;
      if(pct!==null) compareLine = `<div class="compare-line">${pct}% of players made the same call here.</div>`;
    }
    return `
      <div class="gt-block">
        <div class="gt-title">${sc.title} — you chose: ${r.decision.toUpperCase()}${r.used_verify ? " (after requesting more data)":""}${r.waited_for_pressure ? " (window closed)":""}</div>
        <div class="gt-truth">Actually: ${r.ground_truth}</div>
        ${compareLine}
      </div>
    `;
  }).join("");

  app.innerHTML = `
    ${eyebrow("System Debrief")}
    <h1>Sign-Off complete</h1>
    <p>Role played: ${ROLE_INFO[state.role].name}</p>
    <div class="card">
      ${meterHTML("International Humanitarian Law (IHL) compliance", meters.ihl)}
      ${meterHTML("Oversight retained", meters.oversight)}
      ${meterHTML("Mission outcome", meters.mission)}
      
      <div style="font-size: 13px; color: var(--text-muted); margin: 16px 0; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 6px;">
        <strong>How this is calculated:</strong><br>
        • <em>IHL Compliance:</em> Decreases when you authorize strikes on civilians or decoys.<br>
        • <em>Oversight:</em> Decreases when you trust low/medium confidence AI without verifying.<br>
        • <em>Mission Outcome:</em> Decreases when you abort strikes on valid hostile targets.
      </div>

      <div class="meter-row" style="margin-top:32px;">
        <div class="meter-label" style="color:var(--accent-red-text);"><span>Automation Bias Reading</span></div>
        <div class="bignum">${state.biasCount} / ${SCENARIOS.length}</div>
        <p style="margin-top:6px; font-size:13px; color:var(--text-muted);">Times you authorized a medium-or-high-confidence recommendation without requesting more detail first, in an ambiguous scenario.</p>
      </div>
      
      <div class="meter-row" style="margin-top:24px;">
        <div class="meter-label" style="color:var(--text-main);"><span>Hesitation Factor</span></div>
        <div class="bignum" style="color: var(--accent-blue);">${state.hesitatedCount}</div>
        <p style="margin-top:6px; font-size:13px; color:var(--text-muted);">Times you hesitated (hovered over 'Request More Data' for over 1.5 seconds) but ultimately chose to trust the machine's initial read.</p>
      </div>
    </div>

    <h2>What actually happened</h2>
    ${gtHTML}

    <div class="card" style="margin-top: 32px; border-color: var(--border);">
      <p>This isn't hypothetical. Project Maven coordinated targeting behind real strikes, including one that hit a school in Minab and killed as many as 180 people. Systems like Lavender have been used to help select targets in Gaza, with officers reportedly treating machine recommendations as close to verified fact.</p>
      <p style="margin-bottom:0;">Every recommendation in this simulation had a human sign-off built in — the same guarantee these real systems claim. What you just experienced is why that guarantee is often thinner than it sounds: trusting a fast, confident-looking system over your own slower judgment is the easier choice, and it feels rational in the moment. That tendency has a name, automation bias, and systems like these are built assuming you have it.</p>
    </div>

    <button class="restart" onclick="renderIntro()">Run Simulation Again</button>
  `;
}
