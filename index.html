<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign-Off (Hybrid SaaS Interface)</title>
<style>
  :root {
    /* HYBRID SAAS / TACTICAL THEME */
    --bg-page: #0B1121; /* Deep slate, almost black */
    --bg-card: #1E293B; /* Dark blue/grey slate */
    --border: #334155; /* Subtle separation lines */
    
    --text-main: #F8FAFC; /* Bright white for primary text */
    --text-body: #CBD5E1; /* Soft grey for reading */
    --text-muted: #94A3B8; /* Muted telemetry text */
    
    /* UI Accents */
    --accent-blue: #3B82F6; /* Corporate/Digital Blue */
    --accent-red: #DC2626; /* Lethal/Danger Red */
    --accent-red-dim: rgba(239, 68, 68, 0.1);
    --accent-red-text: #FCA5A5;
    
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "Cascadia Code", "JetBrains Mono", monospace;
  }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  
  body {
    background: var(--bg-page);
    color: var(--text-body);
    font-family: var(--font-sans);
    min-height: 100vh;
    line-height: 1.6;
  }
  
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  
  /* Typography & Structure */
  .eyebrow {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  
  h1 {
    font-size: 24px;
    color: var(--text-main);
    margin: 0 0 8px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  
  h2 {
    font-size: 18px;
    color: var(--text-main);
    margin: 0 0 16px;
    font-weight: 500;
  }
  
  h3 {
    font-size: 14px;
    color: var(--text-main);
    margin: 24px 0 8px;
    font-weight: 600;
  }
  
  p { margin: 0 0 16px; font-size: 14.5px; }
  
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  
  /* Telemetry & Badges */
  .contact-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  
  .confidence {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .conf-low { background: rgba(245, 158, 11, 0.1); color: #FCD34D; border: 1px solid rgba(245, 158, 11, 0.2); }
  .conf-medium { background: rgba(249, 115, 22, 0.1); color: #FDBA74; border: 1px solid rgba(249, 115, 22, 0.2); }
  .conf-high { background: var(--accent-red-dim); color: var(--accent-red-text); border: 1px solid rgba(239, 68, 68, 0.2); }
  
  /* Buttons - SaaS Styling */
  button {
    font-family: var(--font-sans);
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    width: 100%;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  
  /* Action-specific button styling */
  button[data-action="engage"] {
    background: var(--accent-red);
    color: white;
    border-color: var(--accent-red);
    box-shadow: 0 2px 4px rgba(220, 38, 38, 0.2);
  }
  button[data-action="engage"]:hover:not(:disabled) { background: #B91C1C; }
  
  button[data-action="verify"] {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
    box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
  }
  button[data-action="verify"]:hover:not(:disabled) { background: #2563EB; }
  
  button[data-action="abort"], button[data-action="escalate"] {
    background: transparent;
    border-color: var(--border);
  }
  button[data-action="abort"]:hover:not(:disabled), button[data-action="escalate"]:hover:not(:disabled) {
    background: #334155;
  }
  
  .startbtn {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
    margin-top: 10px;
  }
  .startbtn:hover { background: #2563EB; }
  
  .role-btn {
    background: var(--bg-card);
    text-align: left;
    margin-bottom: 12px;
  }
  .role-btn:hover { background: var(--border); }
  .role-btn .rname { font-weight: 600; display: block; margin-bottom: 4px; color: var(--text-main); }
  .role-btn .rdesc { font-size: 13px; color: var(--text-muted); font-weight: normal; }
  
  .restart { text-align: center; margin-top: 20px; }
  .restart:hover { background: var(--border); }
  
  /* Timer & Progress */
  .timerbar-track {
    height: 6px;
    background: var(--bg-page);
    border-radius: 3px;
    overflow: hidden;
    margin: 16px 0 8px;
  }
  .timerbar-fill {
    height: 100%;
    background: var(--accent-blue);
    transition: width 1s linear, background 0.5s;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
  }
  .timerlabel {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .stale-note {
    font-size: 13px;
    color: var(--accent-red-text);
    margin-bottom: 16px;
    font-weight: 500;
  }
  
  /* Reveals & Debrief */
  .reveal-note {
    font-size: 14px;
    color: var(--text-body);
    background: rgba(59, 130, 246, 0.1);
    border-left: 3px solid var(--accent-blue);
    padding: 12px 16px;
    margin-bottom: 16px;
    border-radius: 0 4px 4px 0;
  }
  .reveal-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-blue);
    display: block;
    margin-bottom: 6px;
  }
  .disclosure {
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 16px;
  }
  
  /* Debrief Meters */
  .meter-row { margin-bottom: 20px; }
  .meter-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--text-main);
  }
  .meter-track {
    height: 8px;
    background: var(--bg-page);
    border-radius: 4px;
    overflow: hidden;
  }
  .meter-fill { height: 100%; border-radius: 4px; }
  
  .gt-block {
    background: var(--bg-card);
    border-left: 3px solid var(--border);
    padding: 16px;
    margin-bottom: 16px;
    border-radius: 0 6px 6px 0;
  }
  .gt-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: var(--text-main); }
  .gt-truth { font-size: 14px; color: var(--text-body); }
  .compare-line { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  
  .bignum { font-size: 36px; font-weight: 600; color: var(--text-main); }
  
  /* Loading Overlay */
  .loading-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(30, 41, 59, 0.9); /* Matches card bg with opacity */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 8px;
  }
  .loading-overlay.active {
    visibility: visible;
    opacity: 1;
  }
  .loader {
    border: 3px solid var(--border);
    border-top: 3px solid var(--accent-blue);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>

/* ============ STATE ============ */
let state = {};

function freshState(){
  return {
    role:null, sessionId:null, roundIndex:0, log:[],
    meters:{ihl:50,oversight:50,mission:50}, biasCount:0,
    timer:null, timeLeft:ROUND_SECONDS, stale:false,
    contactsQueue:[], contactPos:0,
    currentRevealed:false, usedVerifyThisContact:false,
    isVerifying:false 
  };
}

function uid(){
  return (crypto.randomUUID ? crypto.randomUUID() : ("s"+Math.random().toString(36).slice(2)+Date.now()));
}

/* ============ NETWORKING ============ */
function postData(payload){
  try{
    fetch(SHEET_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    }).catch(()=>{});
  }catch(e){}
}

async function fetchAggregate(){
  try{
    const res = await fetch(SHEET_URL, {method:"GET"});
    return await res.json();
  }catch(e){
    return {};
  }
}

/* ============ RENDER HELPERS ============ */
const app = document.getElementById("app");

function eyebrow(right){
  return `<div class="eyebrow"><span>System Initialization</span><span>${right||"Status: Nominal"}</span></div>`;
}

function confBadge(level){
  const cls = level==="Low"?"conf-low":(level==="Medium"?"conf-medium":"conf-high");
  return `<span class="confidence ${cls}">Confidence: ${level}</span>`;
}

/* ============ SCREEN: INTRO ============ */
function renderIntro(){
  app.innerHTML = `
    ${eyebrow("Session Details")}
    <h1>Sign-Off</h1>

      <button class="startbtn" onclick="renderLawBrief()">Begin</button>
      <div class="disclosure">Your decisions are logged anonymously for research on how people interact with AI-assisted targeting recommendations.</div>
      
      <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center;">
        <img src="image_265385.png" alt="Takshashila Institution Logo" style="max-height: 80px; margin-bottom: 12px;">
        <div style="font-size: 13px; color: var(--text-muted); font-weight: 500;">
          A work in progress project by the Takshashila Institution
        </div>
      </div>
    </div>
  `;
}

/* ============ SCREEN: IHL / GGE BRIEF ============ */
function renderLawBrief(){
  app.innerHTML = `
    ${eyebrow("Legal Framework Parameters")}
    <h1>Before you start</h1>
    <div class="card">
      <h3>What already applies</h3>
      <p>International Humanitarian Law (IHL) governs this, autonomous or not. Three principles do most of the work: distinction — separating combatants from civilians; proportionality — weighing expected military advantage against expected civilian harm; and precaution — taking feasible steps to verify before acting. None were written with AI in mind. Nothing about AI exempts a state from them.</p>

      <h3>What states have agreed on so far</h3>
      <p>Since 2017, a United Nations-mandated Group of Governmental Experts (GGE), under the Convention on Certain Conventional Weapons (CCW), has been negotiating what more is needed. In 2019 it adopted a set of guiding principles: International Humanitarian Law (IHL) applies in full, human responsibility for the use of force cannot be delegated to a machine, and risk mitigation has to be built into a system's design from the start.</p>

      <h3>Where it's stuck</h3>
      <p>The unresolved fight is over what "human responsibility" actually requires in practice. Heading into the Convention on Certain Conventional Weapons (CCW) Seventh Review Conference in November 2026, most delegations want binding language requiring "meaningful human control" or "context-appropriate human judgment" across a weapon's full lifecycle. The United States has consistently opposed fixed thresholds, proposing looser standards instead — most recently "good faith human judgement and care," rather than a defined bar every system has to clear. The International Committee of the Red Cross (ICRC) and the UN Secretary-General have jointly called for a binding instrument by the end of 2026. Whether that happens is still open.</p>

      <h3>Why this matters here</h3>
      <p>Every system in this simulation claims a human is responsible for the outcome. What that responsibility is worth in practice is what you're about to test.</p>

      <button class="startbtn" onclick="goToRoleSelect()">Continue</button>
    </div>
  `;
}

/* ============ SCREEN: ROLE SELECT ============ */
function goToRoleSelect(){
  app.innerHTML = `
    ${eyebrow("Authority Selection")}
    <h1>Choose your seat</h1>
    <p>Same incidents. Different vantage point.</p>
    ${Object.entries(ROLE_INFO).map(([key,info])=>`
      <button class="role-btn" onclick="startSession('${key}')">
        <span class="rname">${info.name}</span>
        <span class="rdesc">${info.desc}</span>
      </button>
    `).join("")}
  `;
}

/* ============ SESSION START ============ */
function startSession(role){
  state = freshState();
  state.role = role;
  state.sessionId = uid();
  loadRound(0);
}

/* ============ ROUND / CONTACT SETUP ============ */
function loadRound(idx){
  clearInterval(state.timer);
  state.roundIndex = idx;
  const scenario = SCENARIOS[idx];
  const queue = [{kind:"main", scenario}];
  if(state.role === "commander"){
    const shuffled = [...FILLERS];
    if(idx % 2 === 0){ queue.push({kind:"filler", filler: shuffled[0]}); }
    else { queue.push({kind:"filler", filler: shuffled[1]}); queue.push({kind:"filler", filler: shuffled[0]}); }
    queue.sort(()=>Math.random()-0.5);
  }
  state.contactsQueue = queue;
  state.contactPos = 0;
  state.timeLeft = ROUND_SECONDS;
  state.stale = false;
  state.currentRevealed = false;
  state.usedVerifyThisContact = false;
  state.isVerifying = false;
  renderContact();
  startTimer();
}

function startTimer(){
  clearInterval(state.timer);
  state.timer = setInterval(()=>{
    if(state.isVerifying) return; 

    state.timeLeft -= 1;
    if(state.timeLeft <= 0){
      state.timeLeft = 0;
      state.stale = true;
      clearInterval(state.timer);
    }
    updateTimerUI();
  },1000);
}

function updateTimerUI(){
  const fill = document.getElementById("timerfill");
  const label = document.getElementById("timerlabel");
  const staleNote = document.getElementById("staleNote");
  if(!fill) return;
  const pct = Math.max(0,(state.timeLeft/ROUND_SECONDS)*100);
  fill.style.width = pct+"%";
  fill.style.background = pct>30 ? "var(--accent-blue)" : "var(--accent-red)";
  if(label) label.textContent = state.stale ? "TIME EXPIRED" : `T-MINUS ${state.timeLeft}.0s`;
  if(staleNote) staleNote.style.display = state.stale ? "block":"none";
  document.querySelectorAll("[data-action='verify']").forEach(b=>{
    if(state.stale) b.disabled = true;
  });
}

/* ============ RENDER CONTACT ============ */
function renderContact(){
  const item = state.contactsQueue[state.contactPos];
  const roleInfo = ROLE_INFO[state.role];
  const totalRounds = SCENARIOS.length;
  const contactTag = state.contactsQueue.length>1
    ? `<div class="contact-tag">QUEUE: CONTACT ${state.contactPos+1} OF ${state.contactsQueue.length}</div>` : "";

  let bodyText, confidence, revealText;
  if(item.kind === "main"){
    bodyText = item.scenario.text[state.role];
    confidence = item.scenario.confidence;
    revealText = item.scenario.reveal[state.role];
  } else {
    bodyText = item.filler.label;
    confidence = item.filler.confidence;
    revealText = item.filler.reveal || null;
  }

  let menuEntries = roleInfo.menu;
  if(state.currentRevealed){
    menuEntries = roleInfo.menu.filter(([label,action]) => action !== "verify");
  }
  const menuButtons = menuEntries.map(([label,action])=>{
    const handler = action === "verify" ? `triggerVerify()` : `handleDecision('${action}')`;
    return `<button data-action="${action}" onclick="${handler}">${label}</button>`;
  }).join("");

  const revealBlock = (state.currentRevealed && revealText) ? `
    <div class="reveal-note">
      <span class="reveal-tag">Telemetry / Additional Data</span>
      ${revealText}
    </div>
  ` : "";

  const loaderOverlay = `
    <div id="verifyLoader" class="loading-overlay ${state.isVerifying ? 'active' : ''}">
      <div class="loader"></div>
    </div>
  `;

  app.innerHTML = `
    ${eyebrow(`SCENARIO 0${state.roundIndex+1} // 10`)}
    <h2>${roleInfo.name} Review</h2>
    <div class="card">
      ${loaderOverlay}
      <div id="cardContent" style="${state.isVerifying ? 'visibility:hidden' : ''}">
        ${contactTag}
        ${confBadge(confidence)}
        <p>${bodyText}</p>
        ${revealBlock}
        <div class="timerbar-track"><div class="timerbar-fill" id="timerfill" style="width:100%"></div></div>
        <div class="timerlabel" id="timerlabel">T-MINUS ${ROUND_SECONDS}.0s</div>
        <div class="stale-note" id="staleNote" style="display:none;">Window closed — telemetry is stale. Force final decision.</div>
        ${menuButtons}
      </div>
    </div>
  `;
  updateTimerUI();
}

/* ============ VERIFY (REVEAL) ============ */
function triggerVerify(){
  if(state.currentRevealed || state.stale || state.isVerifying) return;
  
  state.isVerifying = true;
  renderContact(); 

  setTimeout(() => {
    state.isVerifying = false;
    state.currentRevealed = true;
    state.usedVerifyThisContact = true;
    state.timeLeft = Math.max(0, state.timeLeft - VERIFY_TIME_COST);
    if(state.timeLeft === 0) state.stale = true;
    renderContact();
  }, VERIFY_LOADING_MS);
}

/* ============ DECISION HANDLING ============ */
function resolveFillerGroundTruth(filler){
  if(filler.groundTruth === "__RANDOM__") return Math.random()<0.5 ? "legit" : "false_alarm";
  return filler.groundTruth;
}
function resolveScenarioGroundTruth(scenario){
  if(scenario.groundTruth === "__RANDOM__"){
    return Math.random()<0.5
      ? "It proceeded correctly on its own — the contact was hostile."
      : "It proceeded in error — the contact was not hostile.";
  }
  return scenario.groundTruth;
}

function handleDecision(action){
  if(state.isVerifying) return; 

  const item = state.contactsQueue[state.contactPos];
  let ihl=0, oversight=0, mission=0, ambiguous=false, confidence, scenarioId, groundTruth, biasFlag=false;
  const usedVerify = state.usedVerifyThisContact;

  if(item.kind === "main"){
    const sc = item.scenario;
    scenarioId = sc.id;
    ambiguous = sc.ambiguous;
    confidence = sc.confidence;
    const s = sc.score[action] || {ihl:0,oversight:0,mission:0};
    ihl = s.ihl; oversight = s.oversight; mission = s.mission;
    groundTruth = resolveScenarioGroundTruth(sc);
    if(s.random && groundTruth.includes("error")){ ihl-=3; oversight-=1; mission-=2; }
    biasFlag = (ambiguous && action==="engage" && !usedVerify && (confidence==="Medium"||confidence==="High"));
    if(usedVerify){ ihl += 1; oversight += 2; }
  } else {
    const f = item.filler;
    scenarioId = "filler_"+f.key;
    confidence = f.confidence;
    ambiguous = true;
    const s = f.score[action] || {ihl:0,oversight:0,mission:0};
    ihl = s.ihl; oversight = s.oversight; mission = s.mission;
    const gt = resolveFillerGroundTruth(f);
    groundTruth = gt;
    if(s.random && gt==="false_alarm" && action==="engage"){ ihl-=2; oversight-=1; mission-=1; }
    biasFlag = (action==="engage" && !usedVerify && (confidence==="Medium"||confidence==="High"));
    if(usedVerify){ ihl += 1; oversight += 2; }
  }

  state.meters.ihl += ihl;
  state.meters.oversight += oversight;
  state.meters.mission += mission;
  if(biasFlag) state.biasCount += 1;

  state.log.push({
    scenario_id: scenarioId, contact_index: state.contactPos, ai_confidence: confidence,
    decision: action, used_verify: usedVerify, waited_for_pressure: state.stale,
    was_ambiguous: ambiguous, automation_bias_flag: biasFlag, ihl_outcome: ihl, ground_truth: groundTruth
  });

  postData({
    type:"round", session_id: state.sessionId, role: state.role, scenario_id: scenarioId,
    contact_index: state.contactPos, ai_confidence: confidence, decision: action, used_verify: usedVerify,
    waited_for_pressure: state.stale, was_ambiguous: ambiguous, automation_bias_flag: biasFlag,
    ihl_outcome: ihl, ground_truth: groundTruth
  });

  state.contactPos += 1;
  state.currentRevealed = false;
  state.usedVerifyThisContact = false;

  if(state.contactPos < state.contactsQueue.length){
    renderContact();
  } else if(state.roundIndex + 1 < SCENARIOS.length){
    loadRound(state.roundIndex + 1);
  } else {
    clearInterval(state.timer);
    finishSession();
  }
}

/* ============ DEBRIEF ============ */
async function finishSession(){
  const clamp = v => Math.max(0, Math.min(100, Math.round(v)));
  const meters = {
    ihl: clamp(state.meters.ihl),
    oversight: clamp(state.meters.oversight),
    mission: clamp(state.meters.mission)
  };

  postData({
    type:"session", session_id: state.sessionId, role: state.role,
    ihl_compliance: meters.ihl, oversight_retained: meters.oversight, mission_success: meters.mission,
    automation_bias_count: state.biasCount, scenarios_completed: SCENARIOS.length
  });

  app.innerHTML = `${eyebrow("SYSTEM DEBRIEF")}<h1>Compiling results…</h1><p>Pulling comparison data.</p>`;
  const agg = await fetchAggregate();
  renderDebrief(meters, agg);
}

function meterColor(v){
  if(v>=66) return "var(--accent-blue)";
  if(v>=40) return "#94A3B8"; 
  return "var(--accent-red)";
}

function renderDebrief(meters, agg){
  const meterHTML = (label,val) => `
    <div class="meter-row">
      <div class="meter-label"><span>${label}</span><span>${val}</span></div>
      <div class="meter-track"><div class="meter-fill" style="width:${val}%; background:${meterColor(val)};"></div></div>
    </div>
  `;

  const gtHTML = state.log.filter(r=>!r.scenario_id.startsWith("filler_")).map(r=>{
    const sc = SCENARIOS.find(s=>s.id===r.scenario_id);
    let compareLine = "";
    if(agg && agg[r.scenario_id]){
      const counts = agg[r.scenario_id];
      const total = Object.values(counts).reduce((a,b)=>a+b,0);
      const yours = counts[r.decision] || 0;
      const pct = total>0 ? Math.round((yours/total)*100) : null;
      if(pct!==null) compareLine = `<div class="compare-line">${pct}% of players made the same call here.</div>`;
    }
    return `
      <div class="gt-block">
        <div class="gt-title">${sc.title} — you chose: ${r.decision.toUpperCase()}${r.used_verify ? " (after requesting more detail)":""}${r.waited_for_pressure ? " (window closed)":""}</div>
        <div class="gt-truth">Actually: ${r.groundTruth}</div>
        ${compareLine}
      </div>
    `;
  }).join("");

  app.innerHTML = `
    ${eyebrow("System Debrief")}
    <h1>Sign-Off complete</h1>
    <p>Role played: ${ROLE_INFO[state.role].name}</p>
    <div class="card">
      ${meterHTML("International Humanitarian Law (IHL) compliance", meters.ihl)}
      ${meterHTML("Oversight retained", meters.oversight)}
      ${meterHTML("Mission outcome", meters.mission)}
      <div class="meter-row" style="margin-top:32px;">
        <div class="meter-label" style="color:var(--accent-red-text);"><span>Automation bias reading</span></div>
        <div class="bignum">${state.biasCount} / ${SCENARIOS.length}</div>
        <p style="margin-top:6px; font-size:13px; color:var(--text-muted);">Times you followed a medium-or-high-confidence recommendation without requesting more detail first, in a scenario built to be ambiguous.</p>
      </div>
    </div>

    <h2>What actually happened</h2>
    ${gtHTML}

    <div class="card" style="margin-top: 32px; border-color: var(--border);">
      <p>This isn't hypothetical. Project Maven coordinated targeting behind real strikes, including one that hit a school in Minab and killed as many as 180 people. Systems like Lavender have been used to help select targets in Gaza, with officers reportedly treating machine recommendations as close to verified fact.</p>
      <p style="margin-bottom:0;">Every recommendation in this simulation had a human sign-off built in — the same guarantee these real systems claim. What you just experienced is why that guarantee is often thinner than it sounds: trusting a fast, confident-looking system over your own slower judgment is the easier choice, and it feels rational in the moment. That tendency has a name, automation bias, and systems like these are built assuming you have it.</p>
    </div>

    <button class="restart" onclick="renderIntro()">Run Simulation Again</button>
  `;
}

/* ============ INIT ============ */
renderIntro();
</script>
